name: daily-property-watch

on:
  schedule:
    - cron: "0 13 * * *"   # Daily 13:00 UTC = 8:00 AM Jamaica time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run parser smoke tests
        run: python -m unittest discover -s tests -v
        continue-on-error: true   # tests are alerts, not blockers — broken parser shouldn't kill the daily run

      - name: Run daily scrape + publish digest
        run: python -m src.main

      - name: Commit DB and digest (only when something changed)
        shell: bash
        run: |
          if [ ! -f data/last_run_status.json ]; then
            echo "no status file — scrape may have failed early; skipping commit"
            exit 0
          fi
          delta=$(python -c "import json; d=json.load(open('data/last_run_status.json')); print(d.get('new',0)+d.get('dropped',0))")
          if [ "$delta" -eq 0 ]; then
            echo "no new or dropped listings — skipping commit to avoid email churn"
            exit 0
          fi
          git config user.name "property-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/listings.db data/fx_cache.json data/last_digest.html data/last_run_status.json docs/
          if ! git diff --staged --quiet; then
            git commit -m "daily run $(date -u +%Y-%m-%d) — $delta change(s)"
            git push
          fi
