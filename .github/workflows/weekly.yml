name: weekly-property-watch

on:
  schedule:
    - cron: "0 13 * * 0"   # Sundays 13:00 UTC = 8:00 AM Jamaica time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run weekly scrape + publish digest
        run: python -m src.main

      - name: Commit DB and digest
        run: |
          git config user.name "property-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/listings.db data/fx_cache.json data/last_digest.html docs/
          if ! git diff --staged --quiet; then
            git commit -m "weekly run $(date -u +%Y-%m-%d)"
            git push
          else
            echo "no changes to commit"
          fi
